
name: shippingservice CI

run-name: "shippingservice — ${{ github.event.head_commit.message || github.event.pull_request.title }} (${{ github.sha }})"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - '.github/workflows/shippingservice.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - '.github/workflows/shippingservice.yaml'

permissions:
  contents: write
  id-token: write   


jobs:

  sonar-and-snyk:
    if: github.event_name == 'pull_request'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/sonar-and-snyk.yaml@feature/loose-coupling
    with:
      service_name: shippingservice
      service_path: src/
      runtime: java
      java-version: "21"
      java-build-tool: "gradle"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  generate-tag-and-build-image:
    needs: [sonar-and-snyk]
    if: |
      always() &&
      (
        (github.event_name == 'pull_request' && needs.sonar-and-snyk.result == 'success') ||
        github.event_name == 'push'
      )
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/generate-tag-and-build-image-trivy.yaml@feature/loose-coupling
    with:
      service_name: shippingservice
      service_path: src/
      run_trivy: ${{ github.event_name == 'pull_request' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  push:
    needs: [generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.generate-tag-and-build-image.result == 'success'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/push.yaml@feature/loose-coupling
    with:
      service_name: shippingservice
      git_tag: ${{ needs.generate-tag-and-build-image.outputs.tag }}
      tag_exists: ${{ needs.generate-tag-and-build-image.outputs.tag_exists }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}


  # update helm values for dev
  update-helm-values-dev:
    needs: [push, generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      github.ref_name == 'develop' &&
      needs.push.result == 'success'
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/helm-updater-job.yaml@feature/loose-coupling
    with:
      service_name: shippingservice
      image_tag: ${{ needs.generate-tag-and-build-image.outputs.tag }}
      helm_values_path: "hipstershop-micro-apps/shippingservice/values.dev.yaml"
      target_branch: "develop"
    secrets:
      HELM_CHARTS_TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}


  # ── Production CD Gate ───────────────────────────────────────────────────────
  # Two-step pattern required because GitHub does NOT allow environment: + uses:
  # in the same job.
  #   1. prod-approval-gate  — pauses the workflow for manual approval
  #   2. deploy-to-prod      — self-hosted runner deploys directly to the cluster
  prod-approval-gate:
    needs: [push, generate-tag-and-build-image]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      github.ref_name == 'main' &&
      needs.push.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved — proceeding to deploy shippingservice to Production
        run: echo "Production deployment approved for tag ${{ needs.generate-tag-and-build-image.outputs.tag }}"



  deploy-to-prod:
    name: Deploy shippingservice to prod cluster
    needs: [prod-approval-gate, generate-tag-and-build-image]
    if: |
      always() &&
      needs.prod-approval-gate.result == 'success'
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Request GitHub OIDC token
        id: oidc
        run: |
          # GitHub injects ACTIONS_ID_TOKEN_REQUEST_TOKEN and ACTIONS_ID_TOKEN_REQUEST_URL
          # into every runner — including self-hosted — when id-token: write is set.
          # audience=kubernetes must match --oidc-client-id configured on the kube-apiserver.
          TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=kubernetes" \
            | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure kubectl (OIDC kubeconfig)
        run: |
          echo "${{ secrets.K8S_CA_CERT }}" | base64 -d > ca.crt
          # Read CA cert directly from the runner node — no secret needed.
          # API server reachable at localhost because runner is in the same VPC.
          kubectl config set-cluster prod-cluster \
            --server=${{ secrets.K8S_API_SERVER }} \
            --certificate-authority=ca.crt \
            --embed-certs=true

          kubectl config set-credentials github-actions-oidc \
            --token="${{ steps.oidc.outputs.token }}"

          kubectl config set-context prod \
            --cluster=prod-cluster \
            --user=github-actions-oidc

          kubectl config use-context prod



      - name: Deploy new image to prod
        run: |
          TAG="${{ needs.generate-tag-and-build-image.outputs.tag }}"
          IMAGE="yampss/hipstershop-shippingservice:${TAG}"
          echo "Deploying image: ${IMAGE}"

          # Container name in the Deployment spec is 'server' (see templates/deployment.yaml).
          kubectl set image deployment/shippingservice \
            server="${IMAGE}" \
            -n hipster-backend

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/shippingservice \
            -n hipster-backend \
            --timeout=5m

      - name: Show final pod state
        if: always()
        run: |
          kubectl get pods \
            -n hipster-backend \
            -l app=shippingservice \
            -o wide

  notify:
    needs: [sonar-and-snyk, generate-tag-and-build-image, push, update-helm-values-dev, deploy-to-prod]
    if: always()
    uses: HipsterShopp/hipstershop-shared-workflows/.github/workflows/notify.yaml@feature/loose-coupling
    with:
      service_name: shippingservice
      git_tag: ${{ needs.generate-tag-and-build-image.outputs.tag || 'N/A' }}
      sonarqube_result: ${{ needs.sonar-and-snyk.outputs.sonarqube_result || 'skipped' }}
      snyk_result: ${{ needs.sonar-and-snyk.outputs.snyk_result || 'skipped' }}
      generate_tag_result: ${{ needs.generate-tag-and-build-image.result || 'skipped' }}
      build_result: ${{ needs.generate-tag-and-build-image.outputs.build_result || 'skipped' }}
      trivy_result: ${{ needs.generate-tag-and-build-image.outputs.trivy_result || 'skipped' }}
      push_result: ${{ needs.push.outputs.push_result || 'skipped' }}
    secrets:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
